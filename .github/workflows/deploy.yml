name: Deploy Shiroa Notes to GitHub Pages

on:
  push:
    branches: ['main'] # 当推送到 main 分支时触发
  workflow_dispatch:   # 允许你在 GitHub 网页上手动点击运行

# 设置 GitHub Pages 部署所需的权限
permissions:
  pages: write
  id-token: write
  contents: read

# 防止同时进行多个部署导致冲突
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive # 如果你有用到子模块，保持开启

      - name: Download font assets
        run: |
          mkdir -p assets/fonts
          curl -L https://github.com/Myriad-Dreamin/shiroa/releases/download/v0.1.0/charter-font-assets.tar.gz | tar -xvz -C assets/fonts/
          curl -L https://github.com/Myriad-Dreamin/shiroa/releases/download/v0.1.5/source-han-serif-font-assets.tar.gz | tar -xvz -C assets/fonts/

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 安装缓存，加快第二次之后的编译速度
      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
      
      
      - name: Cache Shiroa executable
        id: cache-shiroa
        uses: actions/cache@v3
        with:
          path: ~/.cargo/bin/shiroa
          key: ${{ runner.os }}-shiroa-bin-v1  

      - name: Install Shiroa 
        if: steps.cache-shiroa.outputs.cache-hit != 'true'
        run: cargo install --git https://github.com/Myriad-Dreamin/shiroa.git --tag v0.2.0 --locked shiroa

      # 运行编译（请根据你本地实际的输出文件夹进行修改，假设输出在 book/ 文件夹）
      # 如果你的命令有加 --font-path 等参数，请照搬你本地的命令
      - name: Build Notes
        run: shiroa build  --path-to-root /notes/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 打包编译好的静态文件
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 【注意】这里填入 shiroa 编译后生成的文件夹名字！通常是 'book' 或 'dist'
          path: './book' 

      # 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

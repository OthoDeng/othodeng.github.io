name: Deploy Shiroa Notes to GitHub Pages

on:
  push:
    branches: ['main'] # 当推送到 main 分支时触发
  workflow_dispatch:   # 允许你在 GitHub 网页上手动点击运行

# 设置 GitHub Pages 部署所需的权限
permissions:
  pages: write
  id-token: write
  contents: read

# 防止同时进行多个部署导致冲突
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download font assets
        run: |
          mkdir -p assets/fonts
          curl -L https://github.com/Myriad-Dreamin/shiroa/releases/download/v0.1.0/charter-font-assets.tar.gz | tar -xvz -C assets/fonts/
          curl -L https://github.com/Myriad-Dreamin/shiroa/releases/download/v0.1.5/source-han-serif-font-assets.tar.gz | tar -xvz -C assets/fonts/

      - name: Cache Shiroa binary
        id: cache-shiroa
        uses: actions/cache@v4
        with:
          path: ./shiroa-bin
          key: ${{ runner.os }}-shiroa-v0.3.1-rc4

      - name: Download Shiroa
        if: steps.cache-shiroa.outputs.cache-hit != 'true'
        run: |
          mkdir -p shiroa-bin
          curl -L https://github.com/Myriad-Dreamin/shiroa/releases/download/v0.3.1-rc4/shiroa-x86_64-unknown-linux-gnu.tar.gz | tar -xvz -C shiroa-bin/
          chmod +x shiroa-bin/shiroa

      - name: Build Notes
        env:
          TYPST_PACKAGE_PATH: ./packages
        run: ./shiroa-bin/shiroa build --path-to-root / --font-path assets/fonts

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 打包编译好的静态文件
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './book'

      # 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
